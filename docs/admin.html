<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>DISC 后台看板</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#08080a;color:#e8e0d0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}
:root{--gold:#c9a96e;--gold-dim:#8a7a50;--surface:#141418;--border:#2a2a34;--text2:#a09888;--text3:#605850}
.header{text-align:center;padding:40px 20px 30px;border-bottom:1px solid var(--border)}
.header h1{font-size:24px;color:var(--gold);letter-spacing:.06em;margin-bottom:6px}
.header p{font-size:13px;color:var(--text3)}
.stats{display:flex;gap:16px;max-width:600px;margin:24px auto;padding:0 20px;justify-content:center}
.stat-card{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;text-align:center;max-width:250px}
.stat-card .num{font-size:36px;font-weight:800;color:var(--gold);line-height:1.2}
.stat-card .lbl{font-size:12px;color:var(--text3);margin-top:4px;letter-spacing:.04em}
.toolbar{max-width:960px;margin:0 auto 16px;padding:0 20px;display:flex;justify-content:flex-end}
.refresh-btn{padding:8px 20px;background:transparent;border:1.5px solid var(--border);border-radius:20px;color:var(--text2);font-size:13px;cursor:pointer;transition:.2s;font-family:inherit}
.refresh-btn:hover{border-color:var(--gold);color:var(--gold)}
.table-wrap{max-width:960px;margin:0 auto 40px;padding:0 20px;overflow-x:auto}
table{width:100%;border-collapse:collapse;background:var(--surface);border-radius:10px;overflow:hidden;border:1px solid var(--border)}
th{text-align:left;padding:14px 16px;font-size:11px;font-weight:700;color:var(--gold-dim);letter-spacing:.06em;border-bottom:1px solid var(--border);background:rgba(201,169,110,.04)}
td{padding:12px 16px;font-size:13px;border-bottom:1px solid rgba(42,42,52,.5);color:var(--text2)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(201,169,110,.03)}
td:first-child,th:first-child{color:var(--gold);font-weight:600}
.empty{text-align:center;padding:40px;color:var(--text3);font-size:14px}
.footer{text-align:center;padding:20px;color:var(--text3);font-size:11px}
.loading{text-align:center;padding:40px;color:var(--gold-dim)}
</style>
</head>
<body>

<div class="header">
  <h1>📊 DISC 后台看板</h1>
  <p>用户注册数据总览</p>
</div>

<div class="stats">
  <div class="stat-card"><div class="num" id="total-users">-</div><div class="lbl">总注册用户</div></div>
  <div class="stat-card"><div class="num" id="today-users">-</div><div class="lbl">今日新增</div></div>
</div>

<div class="toolbar">
  <button class="refresh-btn" onclick="loadData()">🔄 刷新数据</button>
</div>

<div class="table-wrap">
  <table>
    <thead><tr><th>姓名</th><th>手机号</th><th>DISC 类型</th><th>注册时间</th></tr></thead>
    <tbody id="user-table"><tr><td colspan="4" class="loading">加载中...</td></tr></tbody>
  </table>
</div>

<div class="footer">DISC 后台 · 数据来源 Supabase</div>

<script>
const SB_URL='https://ihtlypzusfsgpieeomhi.supabase.co';
const SB_KEY='sb_publishable_6Tu-LDqldC7AJMAjC0TXVQ_5gQql6Eu';

function loadData(){
  fetch(SB_URL+'/rest/v1/unlocks?select=name,phone,disc_type,created_at&order=created_at.desc&limit=200',{
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
  }).then(function(r){return r.json()}).then(function(data){
    if(!data||data.length===0){
      document.getElementById('user-table').innerHTML='<tr><td colspan="4" class="empty">暂无注册用户</td></tr>';
      document.getElementById('total-users').textContent='0';
      document.getElementById('today-users').textContent='0';
      return;
    }
    var total=data.length;
    var today=new Date().toISOString().slice(0,10);
    var todayCount=data.filter(function(r){return (r.created_at||'').slice(0,10)===today}).length;
    document.getElementById('total-users').textContent=total;
    document.getElementById('today-users').textContent=todayCount;

    var rows='';
    data.forEach(function(r){
      var time=r.created_at?new Date(r.created_at).toLocaleString('zh-CN',{hour12:false}):'-';
      var phone=(r.phone||'').slice(0,3)+'****'+(r.phone||'').slice(7);
      rows+='<tr><td>'+(r.name||'-')+'</td><td>'+phone+'</td><td>'+(r.disc_type||'-')+'</td><td>'+time+'</td></tr>';
    });
    document.getElementById('user-table').innerHTML=rows;
  }).catch(function(e){
    document.getElementById('user-table').innerHTML='<tr><td colspan="4" class="empty">加载失败，请重试</td></tr>';
  });
}

loadData();
</script>
</body>
</html>
